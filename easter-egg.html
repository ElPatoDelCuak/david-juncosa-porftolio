<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/easter-egg/easter-egg.css">
    <title>...</title>
</head>
<body>
    <div class="page-entry-blackout" aria-hidden="true"></div>
    <main>
        <div class="wall">
            <div class="instructions-panel">
                <h2>INSTRUCTIONS</h2>
                <ul>
                    <li>1. GRAB YOUR SCREWDRIVER</li>
                    <li>2. GRBB YOUR HAMMER</li>
                    <li>4. WORK</li>
                    <li>3. 1=11=21= =111221=312211</li>
                </ul>
            </div>
            <div class="monitor">
                <div class="display"></div>
            </div>
        </div>
        <div class="desk">
            <div class="superior-desk"></div>
            <div class="mid-desk">
                <div class="easter-button">
                    <button id="red-button" class="red-button"></button>
                </div>
            </div>
            <div class="inferior-desk"></div>
            <div class="underside-desk">
                <div class="lights-container">
                    <div class="light light-1 light-off"></div>
                    <div class="light light-2 light-off"></div>
                    <div class="light light-3 light-off"></div>
                    <div class="light light-4 light-off"></div>
                    <div class="light light-5 light-off"></div>
                    <div class="light light-6 light-off"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const entryBlackout = document.querySelector('.page-entry-blackout');
            if (!entryBlackout) return;

            requestAnimationFrame(() => {
                entryBlackout.classList.add('is-revealing');
            });

            entryBlackout.addEventListener('transitionend', () => {
                entryBlackout.remove();
            }, { once: true });
        });
    </script>
</body>
</html>
